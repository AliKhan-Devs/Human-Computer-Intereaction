<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate Template Selector</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f1eb;
    --surface: #ffffff;
    --primary: #2c5f2e;
    --primary-light: #e8f5e9;
    --accent: #c9a84c;
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --border: #e0dbd0;
    --selected-ring: #2c5f2e;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
    --shadow-hover: 0 8px 32px rgba(0,0,0,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  .dialog {
    background: var(--surface);
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.18);
    width: 860px;
    max-width: 100%;
    overflow: hidden;
    animation: slideUp 0.35s cubic-bezier(0.22, 1, 0.36, 1);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Header */
  .dialog-header {
    background: var(--primary);
    padding: 20px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .dialog-header h1 {
    font-family: 'Playfair Display', serif;
    color: #ffffff;
    font-size: 1.25rem;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .dialog-header .subtitle {
    color: rgba(255,255,255,0.7);
    font-size: 0.78rem;
    margin-top: 2px;
  }
  .close-btn {
    background: rgba(255,255,255,0.15);
    border: none;
    color: white;
    width: 32px; height: 32px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .close-btn:hover { background: rgba(255,255,255,0.28); }

  /* Toolbar */
  .toolbar {
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .search-box {
    flex: 1;
    min-width: 180px;
    position: relative;
  }
  .search-box input {
    width: 100%;
    padding: 9px 14px 9px 36px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: var(--primary); }
  .search-box .icon {
    position: absolute;
    left: 11px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 0.9rem;
  }
  .filter-btn {
    padding: 9px 16px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .filter-btn:hover, .filter-btn.active {
    border-color: var(--primary);
    color: var(--primary);
    background: var(--primary-light);
  }
  .template-count {
    margin-left: auto;
    font-size: 0.82rem;
    color: var(--text-muted);
    white-space: nowrap;
  }
  .template-count span { color: var(--primary); font-weight: 600; }

  /* Grid */
  .grid-area {
    padding: 20px 28px;
    max-height: 380px;
    overflow-y: auto;
  }
  .grid-area::-webkit-scrollbar { width: 6px; }
  .grid-area::-webkit-scrollbar-track { background: transparent; }
  .grid-area::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

  .template-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
    gap: 16px;
  }

  .template-card {
    border: 2px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.22s cubic-bezier(0.22, 1, 0.36, 1);
    position: relative;
    background: var(--surface);
  }
  .template-card:hover {
    border-color: var(--primary);
    box-shadow: var(--shadow-hover);
    transform: translateY(-3px);
  }
  .template-card.selected {
    border-color: var(--selected-ring);
    box-shadow: 0 0 0 3px rgba(44,95,46,0.25);
  }

  .card-thumb {
    width: 100%;
    aspect-ratio: 4/3;
    background: #f9f7f2;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  /* Mini certificate previews */
  .cert-preview {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 0.45rem;
    text-align: center;
    padding: 6px;
    border: 1px solid currentColor;
    border-radius: 2px;
  }
  .cert-preview.classic { background: #fffef5; color: #2a2a2a; border-color: #8b7355; font-family: 'Playfair Display', serif; }
  .cert-preview.modern  { background: #f0f4ff; color: #1a2e5e; border-color: #3a5fd9; font-family: 'DM Sans', sans-serif; }
  .cert-preview.elegant { background: #fff8f0; color: #4a2800; border-color: #c9a84c; font-family: 'Playfair Display', serif; }
  .cert-preview.minimal { background: #fafafa; color: #333; border-color: #aaa; font-family: 'DM Sans', sans-serif; }
  .cert-preview.royal   { background: #0d1b4b; color: #d4af37; border-color: #d4af37; font-family: 'Playfair Display', serif; }
  .cert-preview.green   { background: #f0fff4; color: #1a5c2a; border-color: #2c5f2e; font-family: 'DM Sans', sans-serif; }
  .cert-preview .c-title { font-size: 0.6em; font-weight: bold; letter-spacing: 0.05em; text-transform: uppercase; }
  .cert-preview .c-line  { width: 60%; height: 1px; background: currentColor; opacity: 0.4; margin: 3px auto; }
  .cert-preview .c-body  { font-size: 0.5em; opacity: 0.7; line-height: 1.3; }
  .cert-preview .c-sig   { margin-top: 6px; font-size: 0.45em; opacity: 0.5; font-style: italic; }

  .card-info {
    padding: 10px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-name {
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--text);
  }
  .card-id {
    font-size: 0.72rem;
    color: var(--text-muted);
    margin-top: 1px;
  }
  .bookmark-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    color: var(--text-muted);
    padding: 2px;
    transition: color 0.2s, transform 0.15s;
    line-height: 1;
  }
  .bookmark-btn:hover { transform: scale(1.2); }
  .bookmark-btn.saved { color: var(--accent); }

  .selected-badge {
    position: absolute;
    top: 7px; right: 7px;
    background: var(--primary);
    color: white;
    font-size: 0.65rem;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 20px;
    letter-spacing: 0.04em;
  }

  /* Preview panel */
  .preview-bar {
    border-top: 1px solid var(--border);
    padding: 16px 28px;
    background: var(--bg);
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .preview-label {
    font-size: 0.78rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    white-space: nowrap;
  }
  .selected-info {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .selected-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--primary);
    flex-shrink: 0;
  }
  .selected-name {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text);
  }
  .selected-id-tag {
    background: var(--primary-light);
    color: var(--primary);
    font-size: 0.72rem;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 500;
  }
  .no-selection {
    font-size: 0.88rem;
    color: var(--text-muted);
    font-style: italic;
  }

  /* Footer buttons */
  .dialog-footer {
    padding: 16px 28px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 10px;
  }
  .btn {
    padding: 10px 24px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }
  .btn-cancel {
    background: var(--bg);
    color: var(--text-muted);
    border: 1.5px solid var(--border);
  }
  .btn-cancel:hover { border-color: #aaa; color: var(--text); }
  .btn-ok {
    background: var(--primary);
    color: white;
    min-width: 110px;
  }
  .btn-ok:hover { background: #245026; box-shadow: 0 4px 14px rgba(44,95,46,0.35); }
  .btn-ok:disabled { background: #aaa; cursor: not-allowed; box-shadow: none; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px; right: 30px;
    background: #222;
    color: white;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 0.85rem;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.25s;
    pointer-events: none;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<div class="dialog">
  <!-- Header -->
  <div class="dialog-header">
    <div>
      <h1>Select a Certificate Template</h1>
      <div class="subtitle">Click a thumbnail to preview and select</div>
    </div>
    <button class="close-btn" onclick="closeDialog()">✕</button>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-box">
      <span class="icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search templates..." oninput="filterTemplates()">
    </div>
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <!-- Add drop down menu for filter  -->
    <button class="filter-btn" onclick="setFilter('bookmarked', this)">⭐ Saved</button>
    <div class="template-count">Showing <span id="countDisplay">9</span> of 9 templates</div>
  </div>

  <!-- Grid -->
  <div class="grid-area">
    <div class="template-grid" id="templateGrid"></div>
  </div>

  <!-- Preview bar -->
  <div class="preview-bar">
    <span class="preview-label">Selected:</span>
    <div class="selected-info" id="selectedInfo">
      <span class="no-selection">No template selected</span>
    </div>
  </div>

  <!-- Footer -->
  <div class="dialog-footer">
    <button class="btn btn-cancel" onclick="closeDialog()">Cancel</button>
    <button class="btn btn-ok" id="okBtn" disabled onclick="confirmSelection()">Open in Editor</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const templates = [
  { id: 'TPL-001', name: 'Customer Service', style: 'classic', category: 'service' },
  { id: 'TPL-002', name: 'Excellence Award', style: 'modern',  category: 'award' },
  { id: 'TPL-003', name: 'Gold Achievement', style: 'elegant', category: 'award' },
  { id: 'TPL-004', name: 'Minimalist Clean', style: 'minimal', category: 'general' },
  { id: 'TPL-005', name: 'Royal Honor',      style: 'royal',   category: 'honor' },
  { id: 'TPL-006', name: 'Green Diploma',    style: 'green',   category: 'diploma' },
  { id: 'TPL-007', name: 'Employee of Month',style: 'classic', category: 'service' },
  { id: 'TPL-008', name: 'Training Complete',style: 'modern',  category: 'diploma' },
  { id: 'TPL-009', name: 'Leadership Award', style: 'elegant', category: 'award' },
];

let selectedId = null;
let bookmarked = new Set();
let activeFilter = 'all';

function renderGrid(list) {
  const grid = document.getElementById('templateGrid');
  grid.innerHTML = '';
  document.getElementById('countDisplay').textContent = list.length;

  list.forEach(t => {
    const card = document.createElement('div');
    card.className = 'template-card' + (selectedId === t.id ? ' selected' : '');
    card.onclick = () => selectTemplate(t.id);
    card.innerHTML = `
      <div class="card-thumb">
        <div class="cert-preview ${t.style}">
          <div class="c-title">${t.name}</div>
          <div class="c-line"></div>
          <div class="c-body">This certifies that<br><strong>[ Recipient Name ]</strong><br>has demonstrated outstanding performance</div>
          <div class="c-sig">_________________<br>Director</div>
        </div>
        ${selectedId === t.id ? '<span class="selected-badge">✓ Selected</span>' : ''}
      </div>
      <div class="card-info">
        <div>
          <div class="card-name">${t.name}</div>
          <div class="card-id">${t.id}</div>
        </div>
        <button class="bookmark-btn ${bookmarked.has(t.id) ? 'saved' : ''}" 
          onclick="toggleBookmark(event, '${t.id}')" 
          title="${bookmarked.has(t.id) ? 'Remove from saved' : 'Save template'}">
          ${bookmarked.has(t.id) ? '⭐' : '☆'}
        </button>
      </div>
    `;
    grid.appendChild(card);
  });
}

function getFiltered() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  return templates.filter(t => {
    const matchSearch = t.name.toLowerCase().includes(query) || t.id.toLowerCase().includes(query);
    const matchFilter = activeFilter === 'all' || (activeFilter === 'bookmarked' && bookmarked.has(t.id)) ;
    return matchSearch && matchFilter;
  });
}

function filterTemplates() { renderGrid(getFiltered()); }

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderGrid(getFiltered());
}

function selectTemplate(id) {
  selectedId = id;
  const t = templates.find(x => x.id === id);
  document.getElementById('selectedInfo').innerHTML = `
    <div class="selected-dot"></div>
    <span class="selected-name">${t.name}</span>
    <span class="selected-id-tag">${t.id}</span>
  `;
  document.getElementById('okBtn').disabled = false;
  renderGrid(getFiltered());
}

function toggleBookmark(e, id) {
  e.stopPropagation();
  if (bookmarked.has(id)) {
    bookmarked.delete(id);
    showToast('Removed from saved templates');
  } else {
    bookmarked.add(id);
    showToast('Template saved ⭐');
  }
  renderGrid(getFiltered());
}

function confirmSelection() {
  if (!selectedId) return;
  const t = templates.find(x => x.id === selectedId);
  showToast(`Opening "${t.name}" in editor...`);
}

function closeDialog() {
  showToast('Dialog closed');
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// Initial render
renderGrid(templates);
</script>
</body>
</html>
